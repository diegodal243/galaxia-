<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nuestra Galaxia de Amistad 👯‍♀️</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="start-screen">
    <div class="start-glow"></div>
    <div class="sunflower">🌻</div>
    <p class="start-title">nuestra galaxia</p>
    <p class="start-hint">toca para comenzar</p>
  </div>

  <audio id="bg-music" src="assets/cancion.mp3" loop></audio>

  <!-- Hint de controles -->
  <div id="controls-hint" class="hidden">
    <span>🖱 arrastrar · rueda zoom · clic derecho pan</span>
    <span class="touch-hint">👆 deslizar · pellizcar zoom · 2 dedos pan</span>
  </div>

  <div id="scene" class="hidden">
    <div id="bg-stars"></div>
    <div id="camera">
      <div id="black-hole-center">
        <div class="bh-ring bh-ring-1"></div>
        <div class="bh-ring bh-ring-2"></div>
        <div class="bh-ring bh-ring-3"></div>
      </div>
      <div id="accretion-disk">
        <div id="nebula"></div>
        <div id="nebula-2"></div>
      </div>
    </div>
  </div>

  <div id="letter-modal" class="hidden">
    <div class="letter-backdrop"></div>
    <div class="letter-content">
      <button id="close-letter">✖</button>
      <div class="letter-image-container">
        <img id="letter-img" src="" alt="Recuerdo">
        <div class="letter-img-glow"></div>
      </div>
      <h2 id="letter-title">Para mi mejor amiga…</h2>
      <p id="letter-text">Aquí va un mensaje hermoso.</p>
      <div class="letter-stars">✦ ✦ ✦</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
