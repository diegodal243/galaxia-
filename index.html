<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestra Galaxia de Amistad 👯‍♀️</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="start-screen">
    <div class="sunflower">🌻</div>
    <p>Toca para iniciar nuestro universo</p>
  </div>

  <audio id="bg-music" src="assets/cancion.mp3" loop></audio>

  <div id="ui-controls" class="hidden">
    <div class="pan-controls">
      <button id="pan-up">▲</button>
      <div class="pan-horizontal">
        <button id="pan-left">◄</button>
        <button id="pan-right">►</button>
      </div>
      <button id="pan-down">▼</button>
    </div>
    
    <div class="zoom-controls">
      <button id="zoom-in">+</button>
      <input type="range" id="zoom-slider" min="-2500" max="1500" value="100" step="10">
      <button id="zoom-out">-</button>
    </div>
  </div>

  <div id="scene" class="hidden">
    <div id="bg-stars"></div> 
    
    <div id="camera">
      <div id="black-hole-center"></div>

      <div id="accretion-disk"></div>
    </div>
  </div>

  <div id="letter-modal" class="hidden">
    <div class="letter-content">
      <button id="close-letter">✖</button>
      <div class="letter-image-container">
        <img id="letter-img" src="" alt="Recuerdo">
      </div>
      <h2 id="letter-title">Para mi mejor amiga...</h2>
      <p id="letter-text">Aquí va un mensaje hermoso.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
